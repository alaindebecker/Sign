<!DOCTYPE html>

<style>
	* { font-family: sans-serif}
	body { background: whitesmoke }
	#text { width: 40em; margin:0 auto; padding: 0 2em; text-align: justify; background: white }
	blockquote {
  		background: #f9f9f9;
  		border-left: 10px solid #ccc;
  		margin: 1.5em 10px;
  		padding: 1em 10px .1em;
  		quotes: "\201C""\201D""\2018""\2019";
	}
</style>

<div id="text"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
<script>
r = new XMLHttpRequest()
r.onload = function() {
	console.log(r)
    document.getElementById("text").innerHTML = marked.parse(r.response).replace(/\s+:/, "&nbsp;:")
}
r.open("GET", "manuel.md", true);
r.send();
</script>
